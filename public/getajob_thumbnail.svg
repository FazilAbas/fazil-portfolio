<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#violet)"/>
  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#8b5cf6" stroke-width="0.5" fill="none">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Robot/AI icon -->
  <g transform="translate(400, 155)" text-anchor="middle">
    <!-- Robot head -->
    <rect x="-28" y="-28" width="56" height="56" rx="14" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-6" r="4" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="10" cy="-6" r="4" fill="#8b5cf6" opacity="0.8"/>
    <!-- Mouth -->
    <rect x="-10" y="8" width="20" height="3" rx="1.5" fill="#8b5cf6" opacity="0.4"/>
    <!-- Antenna -->
    <line x1="0" y1="-28" x2="0" y2="-40" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="-43" r="3" fill="#8b5cf6" opacity="0.6"/>
  </g>
  <!-- Title -->
  <text x="400" y="220" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="28" font-weight="bold" fill="#fafafa">Get-a-Job Agent</text>
  <text x="400" y="250" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="13" fill="#a1a1aa">Autonomous Job Application Agent</text>
  <!-- Stats row -->
  <g transform="translate(400, 310)" text-anchor="middle">
    <g transform="translate(-180, 0)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-3" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#8b5cf6">3</text>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Data Sources</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-3" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#8b5cf6">3</text>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">LLMs</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-3" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#8b5cf6">25+</text>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Applied</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-3" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#8b5cf6">10</text>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Tabs</text>
    </g>
  </g>
  <!-- Tech badges -->
  <g transform="translate(400, 380)" text-anchor="middle">
    <rect x="-140" y="-12" width="56" height="24" rx="12" fill="#1c1c1f" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
    <text x="-112" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b5cf6">Node.js</text>
    <rect x="-78" y="-12" width="64" height="24" rx="12" fill="#1c1c1f" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
    <text x="-46" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b5cf6">Puppeteer</text>
    <rect x="-6" y="-12" width="48" height="24" rx="12" fill="#1c1c1f" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
    <text x="18" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b5cf6">Groq</text>
    <rect x="48" y="-12" width="72" height="24" rx="12" fill="#1c1c1f" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
    <text x="84" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b5cf6">Gmail API</text>
    <rect x="126" y="-12" width="64" height="24" rx="12" fill="#1c1c1f" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
    <text x="158" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b5cf6">Supabase</text>
  </g>
  <!-- Corner accents -->
  <rect x="20" y="20" width="40" height="3" rx="1.5" fill="#8b5cf6" opacity="0.3"/>
  <rect x="20" y="20" width="3" height="40" rx="1.5" fill="#8b5cf6" opacity="0.3"/>
  <rect x="740" y="427" width="40" height="3" rx="1.5" fill="#8b5cf6" opacity="0.3"/>
  <rect x="777" y="390" width="3" height="40" rx="1.5" fill="#8b5cf6" opacity="0.3"/>
</svg>