<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#red)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#ef4444" stroke-width="0.5" fill="none">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(400, 150)" text-anchor="middle">
    <path d="M0,-35 L30,-20 L30,10 C30,28 15,42 0,48 C-15,42 -30,28 -30,10 L-30,-20 Z" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
    <path d="M0,-25 L22,-14 L22,8 C22,22 11,32 0,36 C-11,32 -22,22 -22,8 L-22,-14 Z" fill="#ef4444" opacity="0.1"/>
    <!-- Checkmark -->
    <path d="M-10,2 L-3,10 L12,-8" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="400" y="225" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="26" font-weight="bold" fill="#fafafa">Phishing Detection</text>
  <text x="400" y="255" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="14" fill="#a1a1aa">&amp; Takedowns Module</text>
  <text x="400" y="280" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="11" fill="#71717a">Product Research</text>
  <!-- Badges -->
  <g transform="translate(400, 340)" text-anchor="middle">
    <rect x="-120" y="-14" width="80" height="28" rx="14" fill="#1c1c1f" stroke="#ef4444" stroke-width="0.5" opacity="0.5"/>
    <text x="-80" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef4444">Security</text>
    <rect x="-30" y="-14" width="60" height="28" rx="14" fill="#1c1c1f" stroke="#ef4444" stroke-width="0.5" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef4444">Product</text>
    <rect x="40" y="-14" width="80" height="28" rx="14" fill="#1c1c1f" stroke="#ef4444" stroke-width="0.5" opacity="0.5"/>
    <text x="80" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef4444">Research</text>
  </g>
  <!-- Corner accents -->
  <rect x="20" y="20" width="40" height="3" rx="1.5" fill="#ef4444" opacity="0.3"/>
  <rect x="20" y="20" width="3" height="40" rx="1.5" fill="#ef4444" opacity="0.3"/>
  <rect x="740" y="427" width="40" height="3" rx="1.5" fill="#ef4444" opacity="0.3"/>
  <rect x="777" y="390" width="3" height="40" rx="1.5" fill="#ef4444" opacity="0.3"/>
</svg>