<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#cyan)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#06b6d4" stroke-width="0.5" fill="none">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Stock chart line -->
  <g transform="translate(400, 140)" text-anchor="middle">
    <polyline points="-80,20 -50,-10 -20,5 10,-25 40,-15 70,-35 100,-20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
    <circle cx="100" cy="-20" r="4" fill="#06b6d4" opacity="0.8"/>
    <!-- Arrow up at end -->
    <polygon points="100,-28 106,-18 94,-18" fill="#06b6d4" opacity="0.7"/>
  </g>
  <!-- Title -->
  <text x="400" y="210" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="30" font-weight="bold" fill="#fafafa">AlphaPulse AI</text>
  <text x="400" y="238" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="13" fill="#a1a1aa">Trade Smarter, Not Harder</text>
  <!-- Stats row -->
  <g transform="translate(400, 300)" text-anchor="middle">
    <g transform="translate(-180, 0)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-3" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#06b6d4">3</text>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">AI Engines</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-3" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#06b6d4">108</text>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Stocks</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-3" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#06b6d4">20+</text>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Indicators</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-3" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#06b6d4">13+</text>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Schedulers</text>
    </g>
  </g>
  <!-- Tech badges -->
  <g transform="translate(400, 375)" text-anchor="middle">
    <rect x="-150" y="-12" width="64" height="24" rx="12" fill="#1c1c1f" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <text x="-118" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#06b6d4">Next.js</text>
    <rect x="-80" y="-12" width="56" height="24" rx="12" fill="#1c1c1f" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <text x="-52" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#06b6d4">FastAPI</text>
    <rect x="-18" y="-12" width="64" height="24" rx="12" fill="#1c1c1f" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <text x="14" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#06b6d4">Gemini</text>
    <rect x="52" y="-12" width="80" height="24" rx="12" fill="#1c1c1f" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <text x="92" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#06b6d4">PostgreSQL</text>
    <rect x="140" y="-12" width="56" height="24" rx="12" fill="#1c1c1f" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <text x="168" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#06b6d4">Vercel</text>
  </g>
  <!-- Corner accents -->
  <rect x="20" y="20" width="40" height="3" rx="1.5" fill="#06b6d4" opacity="0.3"/>
  <rect x="20" y="20" width="3" height="40" rx="1.5" fill="#06b6d4" opacity="0.3"/>
  <rect x="740" y="427" width="40" height="3" rx="1.5" fill="#06b6d4" opacity="0.3"/>
  <rect x="777" y="390" width="3" height="40" rx="1.5" fill="#06b6d4" opacity="0.3"/>
</svg>