<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent)"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#f59e0b" stroke-width="0.5" fill="none">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Title -->
  <text x="400" y="160" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="32" font-weight="bold" fill="#fafafa">CookieYes Product Analytics</text>
  <text x="400" y="200" text-anchor="middle" font-family="Tahoma, Geneva, sans-serif" font-size="14" fill="#a1a1aa">Full-Lifecycle SaaS Analysis Dashboard</text>
  <!-- Stats row -->
  <g transform="translate(400, 270)" text-anchor="middle">
    <g transform="translate(-240, 0)">
      <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-4" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f59e0b">5,010</text>
      <text x="0" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Records</text>
    </g>
    <g transform="translate(-80, 0)">
      <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-4" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f59e0b">25+</text>
      <text x="0" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">SQL Queries</text>
    </g>
    <g transform="translate(80, 0)">
      <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-4" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f59e0b">11</text>
      <text x="0" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Charts</text>
    </g>
    <g transform="translate(240, 0)">
      <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#1c1c1f" stroke="#27272a" stroke-width="1"/>
      <text x="0" y="-4" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f59e0b">6</text>
      <text x="0" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#71717a">Deliverables</text>
    </g>
  </g>
  <!-- Tech badges -->
  <g transform="translate(400, 350)" text-anchor="middle">
    <rect x="-160" y="-12" width="64" height="24" rx="12" fill="#1c1c1f" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <text x="-128" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b">Python</text>
    <rect x="-88" y="-12" width="48" height="24" rx="12" fill="#1c1c1f" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <text x="-64" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b">SQL</text>
    <rect x="-32" y="-12" width="64" height="24" rx="12" fill="#1c1c1f" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b">SQLite</text>
    <rect x="40" y="-12" width="72" height="24" rx="12" fill="#1c1c1f" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <text x="76" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b">Chart.js</text>
    <rect x="120" y="-12" width="56" height="24" rx="12" fill="#1c1c1f" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <text x="148" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b">Pandas</text>
  </g>
  <!-- Corner decoration -->
  <rect x="20" y="20" width="40" height="3" rx="1.5" fill="#f59e0b" opacity="0.3"/>
  <rect x="20" y="20" width="3" height="40" rx="1.5" fill="#f59e0b" opacity="0.3"/>
  <rect x="740" y="427" width="40" height="3" rx="1.5" fill="#f59e0b" opacity="0.3"/>
  <rect x="777" y="390" width="3" height="40" rx="1.5" fill="#f59e0b" opacity="0.3"/>
</svg>